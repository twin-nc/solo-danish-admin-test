apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vatri-platform
  namespace: vatri
spec:
  ingressClassName: nginx
  rules:
    - host: vatri.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vatri-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vatri-frontend
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: vatri-backend
                port:
                  number: 80
