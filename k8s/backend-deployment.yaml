apiVersion: apps/v1
kind: Deployment
metadata:
  name: vatri-backend
  namespace: vatri
  labels:
    app: vatri-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vatri-backend
  template:
    metadata:
      labels:
        app: vatri-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/vatri/vatri-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vatri-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vatri-secrets
                  key: SECRET_KEY
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                secretKeyRef:
                  name: vatri-secrets
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                secretKeyRef:
                  name: vatri-secrets
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3