# IMPORTANT: Replace all placeholder values before deploying.
# This file should NOT be committed with real values.
# Manage production secrets via your CI/CD secrets manager or kubectl create secret.
#
# To generate a SECRET_KEY:
#   python -c "import secrets; print(secrets.token_hex(32))"
#
# stringData values are plaintext — Kubernetes base64-encodes them on apply.

apiVersion: v1
kind: Secret
metadata:
  name: vatri-secrets
  namespace: vatri
type: Opaque
stringData:
  DATABASE_URL: "postgresql://REPLACE_USER:REPLACE_PASS@vatri-db:5432/vatri_db"
  SECRET_KEY: "REPLACE_WITH_32_BYTE_HEX"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  POSTGRES_USER: "REPLACE_WITH_DB_USER"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRES_DB: "vatri_db"