name: Build and Deploy

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vatri-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vatri-frontend

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vatri_ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vatri_ci_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vatri_ci_db
      SECRET_KEY: ci-secret-key-not-for-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ENVIRONMENT: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Unit tests
        run: pytest tests/unit/

      - name: Integration + API tests
        run: pytest tests/integration/ tests/api/

      - name: Coverage gate
        run: pytest --cov=app --cov-fail-under=90

      - name: Container build
        run: docker build -f Dockerfile .

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            BACKEND_URL=http://vatri-backend.vatri.svc.cluster.local
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.KUBE_CONFIG_B64 != '' && secrets.K8S_DATABASE_URL != '' && secrets.K8S_SECRET_KEY != '' && secrets.K8S_POSTGRES_USER != '' && secrets.K8S_POSTGRES_PASSWORD != '' && secrets.K8S_POSTGRES_DB != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create or update Kubernetes secret
        env:
          K8S_DATABASE_URL: ${{ secrets.K8S_DATABASE_URL }}
          K8S_SECRET_KEY: ${{ secrets.K8S_SECRET_KEY }}
          K8S_POSTGRES_USER: ${{ secrets.K8S_POSTGRES_USER }}
          K8S_POSTGRES_PASSWORD: ${{ secrets.K8S_POSTGRES_PASSWORD }}
          K8S_POSTGRES_DB: ${{ secrets.K8S_POSTGRES_DB }}
        run: |
          kubectl -n vatri create secret generic vatri-secrets \
            --from-literal=DATABASE_URL="$K8S_DATABASE_URL" \
            --from-literal=SECRET_KEY="$K8S_SECRET_KEY" \
            --from-literal=ACCESS_TOKEN_EXPIRE_MINUTES="15" \
            --from-literal=REFRESH_TOKEN_EXPIRE_DAYS="7" \
            --from-literal=POSTGRES_USER="$K8S_POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$K8S_POSTGRES_PASSWORD" \
            --from-literal=POSTGRES_DB="$K8S_POSTGRES_DB" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply workload manifests
        run: |
          kubectl apply -f k8s/db-service.yaml
          kubectl apply -f k8s/db-statefulset.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/backend-ingress.yaml

      - name: Pin deployments to commit image
        run: |
          kubectl -n vatri set image deployment/vatri-backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kubectl -n vatri set image deployment/vatri-frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n vatri rollout status deployment/vatri-backend --timeout=180s
          kubectl -n vatri rollout status deployment/vatri-frontend --timeout=180s
